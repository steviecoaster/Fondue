name: Build Chocolatier

on:
  push:
    branches-ignore:
      - gh-pages
  pull_request:
    branches: 
      - main
      - develop

  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      NugetApiKey: ${{ secrets.NugetApiKey }}
      ChocoApiKey: ${{ secrets.ChocoApiKey }}

    steps:
      - uses: actions/checkout@v2
        
      - name: Install-RequiredModules
        uses: PoshCode/Actions/install-requiredmodules@v1

      - name: Build Module
        run: .\build.ps1 -Build -SemVer "${{ steps.gitversion.outputs.LegacySemVerPadded }}"
        shell: pwsh

      - name: Upload Built Module
        uses: actions/upload-artifact@v2
        with:
          name: Chocolatier.${{ steps.gitversion.outputs.LegacySemVerPadded }}
          path: .\Output

      - name: Test Module
        run: .\build.ps1 -RunTest -SemVer "${{ steps.gitversion.outputs.LegacySemVerPadded }}"
        shell: pwsh

      - name: Upload Test Results
        uses: EnricoMi/publish-unit-test-result-action/composite@v1
        if: always()
        with:
          files: TestResults.xml