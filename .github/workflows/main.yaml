name: Build Fondue

on:
  push:
    branches-ignore:
      - gh-pages
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: '6.x'

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3

      - name: Install Required Modules
        uses: PoshCode/Actions/install-requiredmodules@v1
        with:
          requiredModules-path: Requirements.psd1

      - name: Build Module
        shell: pwsh
        run: .\build.ps1 -Build -SemVer "${{ steps.gitversion.outputs.semVer }}"

      - name: Test Module
        shell: pwsh
        run: .\build.ps1 -Build -LoadModule -Test

      - name: Generate Documentation
        shell: pwsh
        run: .\build.ps1 -Build -LoadModule -Document

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install MkDocs
        run: pip install mkdocs

      - name: Deploy Documentation
        run: mkdocs gh-deploy --force
